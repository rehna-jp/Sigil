[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "@chainlink/=lib/chainlink-brownie-contracts/contracts/src/v0.8/",
  "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
arbitrum_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }

[fmt]
line_length = 120
tab_width = 4
