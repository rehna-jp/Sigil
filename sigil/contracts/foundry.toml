[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
arbitrum_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.arbiscan.io/api" }

[chain]
# Arbitrum Sepolia
421614 = { name = "arbitrum_sepolia", rpc = "${ARBITRUM_SEPOLIA_RPC_URL}", chain_id = 421614 }

[fmt]
line_length = 120
tab_width = 4
