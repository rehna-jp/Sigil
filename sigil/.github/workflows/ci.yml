name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          echo "export PATH=\"$HOME/.foundry/bin:$PATH\"" >> $GITHUB_ENV
          foundryup
      - name: Build contracts
        run: |
          cd sigil/contracts
          forge install || true
          forge build
          forge test
      - name: Lint & Build JS
        run: |
          cd sigil/frontend || exit 0
          # npm ci && npm run build (left to maintainers to run in CI)
          echo "Frontend build step skipped in CI stub"
